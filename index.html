<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 编程指南</title>
    <meta name="description" content="Claude Code 与 Codex 中文教程本地阅读页">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="#/codex/01-what-is-codex.md" aria-label="AI 编程指南首页">
          <span class="brand-mark">AI</span>
          <span>
            <strong>AI 编程指南</strong>
            <small>Claude Code + Codex</small>
          </span>
        </a>

        <div class="top-actions">
          <label class="search">
            <input id="searchInput" type="search" placeholder="输入章节名..." autocomplete="off">
          </label>

          <div class="settings-menu">
            <button class="settings-toggle-btn" aria-label="阅读设置" id="settingsToggleBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </button>
            <div class="settings-dropdown" id="settingsDropdown">
              <div class="settings-group">
                <span class="settings-label">主题</span>
                <div class="theme-options">
                  <button class="theme-btn theme-forest-dark active" data-theme="forest-dark" title="森林暗色"></button>
                  <button class="theme-btn theme-deep-dark" data-theme="deep-dark" title="深邃暗色"></button>
                  <button class="theme-btn theme-forest-light" data-theme="forest-light" title="森林柔光"></button>
                </div>
              </div>
              <div class="settings-group">
                <span class="settings-label">字体</span>
                <div class="font-options">
                  <button class="font-btn active" data-font="sans">无衬线体</button>
                  <button class="font-btn" data-font="serif">衬线体</button>
                </div>
              </div>
              <div class="settings-group">
                <span class="settings-label">字号</span>
                <div class="size-options">
                  <button class="size-btn" data-size="sm">A-</button>
                  <button class="size-btn active" data-size="md">默认</button>
                  <button class="size-btn" data-size="lg">A+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <aside class="sidebar" aria-label="文章目录">
        <div class="section-selector-container">
          <select id="sectionSelector" class="section-selector" aria-label="教程分类">
            <option value="vibecoding">VibeCoding 实战</option>
            <option value="codex">Codex</option>
            <option value="claude">Claude Code</option>
          </select>
          <svg class="selector-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
        <nav id="articleNav" class="article-nav"></nav>
      </aside>

      <main class="reader">
        <div id="loading" class="loading">正在打开阅读页...</div>
        <article id="content" class="content" tabindex="-1"></article>
        <nav id="pager" class="pager" aria-label="上一篇和下一篇"></nav>
      </main>

      <aside class="toc-wrap" aria-label="本页目录">
        <div class="toc-title">本页目录</div>
        <nav id="toc" class="toc"></nav>
      </aside>
    </div>

    <script src="./reader.js?v=20260703-dropdown"></script>
